name: Build and Release

# Push a semver tag to trigger the full build + release pipeline.
# Manual dispatch is available for testing builds without a release.
on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.2) — only used for release name"
        required: false
        default: ""

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            final_name: CertWizard-windows.exe
            binary_path: dist/CertWizard.exe

          - os: ubuntu-22.04
            label: linux
            final_name: CertWizard-linux
            binary_path: dist/CertWizard

          - os: macos-latest
            label: macos
            final_name: CertWizard-macos
            binary_path: dist/CertWizard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # -----------------------------------------------------------------------
      # Linux: Tkinter is a separate system package on Ubuntu.
      # xvfb gives a virtual display so Tk can initialise during collection.
      # UPX is installed for binary compression.
      # -----------------------------------------------------------------------
      - name: Install system dependencies (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb upx-ucl

      # macOS: UPX via Homebrew
      - name: Install UPX (macOS)
        if: matrix.label == 'macos'
        run: brew install upx

      # Windows: UPX via choco
      - name: Install UPX (Windows)
        if: matrix.label == 'windows'
        run: choco install upx --no-progress -y
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # -----------------------------------------------------------------------
      # Build using the .spec file.
      # The spec explicitly lists every hidden import and collected data file
      # so the binary is fully self-contained — zero runtime dependencies.
      # Linux wraps the command in xvfb-run so Tkinter can open a display
      # during PyInstaller's module collection phase.
      # -----------------------------------------------------------------------
      - name: Build standalone binary (Linux)
        if: matrix.label == 'linux'
        run: xvfb-run pyinstaller certwizard.spec --clean --noconfirm

      - name: Build standalone binary (Windows / macOS)
        if: matrix.label != 'linux'
        run: pyinstaller certwizard.spec --clean --noconfirm

      # -----------------------------------------------------------------------
      # Smoke-test: verify the binary exists and is non-zero in size.
      # On Linux we also confirm no external .so files leaked outside the exe.
      # -----------------------------------------------------------------------
      - name: Verify binary exists
        shell: bash
        run: |
          if [ ! -f "${{ matrix.binary_path }}" ]; then
            echo "Binary not found at ${{ matrix.binary_path }}"
            exit 1
          fi
          SIZE=$(wc -c < "${{ matrix.binary_path }}")
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Binary is suspiciously small — build may have failed silently"
            exit 1
          fi

      - name: Rename to platform label
        shell: bash
        run: mv "${{ matrix.binary_path }}" "dist/${{ matrix.final_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.final_name }}
          path: dist/${{ matrix.final_name }}
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout (for CHANGES.md)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # Confirm all three binaries landed before we publish anything.
      - name: Verify all artifacts present
        run: |
          for f in CertWizard-windows.exe CertWizard-linux CertWizard-macos; do
            if [ ! -f "release-assets/$f" ]; then
              echo "Missing artifact: $f"
              exit 1
            fi
          done
          ls -lh release-assets/

      - name: Extract release notes from CHANGES.md
        id: notes
        run: |
          python3 - <<'EOF'
          import re, os

          text = open("CHANGES.md").read()
          # Split on every '## ' heading; index 1 is the most recent block.
          blocks = re.split(r"(?=^## )", text, flags=re.MULTILINE)
          body = blocks[1].strip() if len(blocks) > 1 else text.strip()

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"body<<NOTES_EOF\n{body}\nNOTES_EOF\n")
          EOF

      - name: Resolve tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "CertWizard ${{ steps.tag.outputs.name }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            release-assets/CertWizard-windows.exe
            release-assets/CertWizard-linux
            release-assets/CertWizard-macos
