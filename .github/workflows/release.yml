name: Build and Release

# Triggers on every tag that looks like v2.1, v2.1.3, etc.
# You can also kick it off manually from the Actions tab.
on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release under (e.g. v2.2)"
        required: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact: CertWizard-windows.exe
            pyinstaller_args: >-
              --onefile
              --windowed
              --icon=certgen.ico
              --add-data "fonts;fonts"
              --add-data "testfiles;testfiles"
              --name CertWizard
              main.py
            output_path: dist/CertWizard.exe
            final_name: CertWizard-windows.exe

          - os: ubuntu-latest
            label: linux
            artifact: CertWizard-linux
            # Tkinter needs the display libs even when building headlessly.
            # xvfb is used only at build time; the shipped binary runs natively.
            pyinstaller_args: >-
              --onefile
              --windowed
              --icon=certgen.ico
              --add-data "fonts:fonts"
              --add-data "testfiles:testfiles"
              --name CertWizard
              main.py
            output_path: dist/CertWizard
            final_name: CertWizard-linux

          - os: macos-latest
            label: macos
            artifact: CertWizard-macos
            pyinstaller_args: >-
              --onefile
              --windowed
              --icon=certgen.ico
              --add-data "fonts:fonts"
              --add-data "testfiles:testfiles"
              --name CertWizard
              main.py
            output_path: dist/CertWizard
            final_name: CertWizard-macos

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Linux needs the Tkinter system package and a virtual framebuffer
      # so that Tk can initialise during the PyInstaller collection phase.
      - name: Install system dependencies (Linux only)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # The certgen.ico is a Windows icon; PIL may warn on other platforms
      # but PyInstaller handles it gracefully, so no special step needed.
      - name: Build binary (Linux uses xvfb-run)
        shell: bash
        run: |
          if [ "${{ matrix.label }}" = "linux" ]; then
            xvfb-run pyinstaller ${{ matrix.pyinstaller_args }}
          else
            pyinstaller ${{ matrix.pyinstaller_args }}
          fi

      - name: Rename output to platform label
        shell: bash
        run: mv "${{ matrix.output_path }}" "dist/${{ matrix.final_name }}"

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.final_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a real release when triggered by a tag push.
    # Manual runs still upload artifacts but skip the release step.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout source (needed for CHANGES.md)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # Pull the top changelog block (everything between the first and
      # second '## ' headings) and use it as the release body.
      - name: Extract release notes from CHANGES.md
        id: notes
        run: |
          python - <<'EOF'
          import re, os, sys

          text = open("CHANGES.md").read()
          # Find the first version block and grab its content
          blocks = re.split(r"(?=^## )", text, flags=re.MULTILINE)
          # blocks[0] is the file header, blocks[1] is the latest release
          body = blocks[1] if len(blocks) > 1 else text

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              # GitHub outputs use a multiline delimiter
              delimiter = "NOTES_EOF"
              fh.write(f"body<<{delimiter}\n{body.strip()}\n{delimiter}\n")
          EOF

      - name: Resolve tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "CertWizard ${{ steps.tag.outputs.name }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            release-assets/CertWizard-windows.exe
            release-assets/CertWizard-linux
            release-assets/CertWizard-macos
