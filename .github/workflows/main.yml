name: Build Standalone Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: CertWizard-windows.exe
            built_path: dist/CertWizard.exe

          - os: macos-latest
            artifact_name: CertWizard-macos
            built_path: dist/CertWizard

          - os: ubuntu-latest
            artifact_name: CertWizard-linux
            built_path: dist/CertWizard

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Linux needs Tk headers and UPX before we touch Python at all.
      # macOS and Windows runners already have what we need.
      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk tk-dev upx-ucl

      # UPX on macOS via Homebrew (optional but mirrors the spec's upx=True).
      - name: Install UPX (macOS only)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller certwizard.spec

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.built_path }}" "${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    # only run when a tag triggered the workflow
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
