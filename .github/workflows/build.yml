name: Build CertWizard Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm `
            --onefile `
            --windowed `
            --name certwizard `
            --icon icon.ico `
            --add-data "fonts;fonts" `
            --add-data "app;app" `
            --hidden-import PIL._tkinter_finder `
            --collect-all fpdf2 `
            --collect-all openpyxl `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: certwizard-windows
          path: dist/certwizard.exe
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm \
            --onefile \
            --name certwizard \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: certwizard-linux
          path: dist/certwizard
          retention-days: 7

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm \
            --onefile \
            --windowed \
            --name certwizard \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: certwizard-macos
          path: dist/certwizard
          retention-days: 7

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # rename inside each subdirectory so the target name never
      # collides with the artifact directory name itself
      - name: Rename binaries
        run: |
          mv artifacts/certwizard-linux/certwizard   artifacts/certwizard-linux/certwizard-linux
          mv artifacts/certwizard-macos/certwizard    artifacts/certwizard-macos/certwizard-macos

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/certwizard-windows/certwizard.exe
            artifacts/certwizard-linux/certwizard-linux
            artifacts/certwizard-macos/certwizard-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
