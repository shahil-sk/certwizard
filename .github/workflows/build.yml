name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# default to read-only; the release job needs write to publish assets
permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: certwizard-windows
            executable: certwizard.exe
          - os: ubuntu-latest
            artifact_name: certwizard-linux
            executable: certwizard
          - os: macos-latest
            artifact_name: certwizard-macos
            executable: certwizard

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ubuntu runners ship a minimal python that has no tkinter
      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project dependencies
        run: |
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name certwizard `
            --icon icon.ico `
            --add-data "fonts;fonts" `
            --add-data "app;app" `
            --hidden-import PIL._tkinter_finder `
            --collect-all fpdf2 `
            --collect-all openpyxl `
            main.py

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onefile \
            --name certwizard \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name certwizard \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable }}
          retention-days: 7

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    # only runs when the workflow is triggered by a version tag
    if: startsWith(github.ref, 'refs/tags/v')
    # this job needs write access to create/update the release and upload assets
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # download-artifact v4 places each artifact in its own subdirectory.
      # rename to flat filenames that are distinct from the directory names.
      - name: Rename binaries to descriptive names
        run: |
          mv dist/certwizard-windows/certwizard.exe  dist/certwizard-windows.exe
          mv dist/certwizard-linux/certwizard         dist/certwizard-linux
          mv dist/certwizard-macos/certwizard         dist/certwizard-macos

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/certwizard-windows.exe
            dist/certwizard-linux-x86_64
            dist/certwizard-macos-x86_64
