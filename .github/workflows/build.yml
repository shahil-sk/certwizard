name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: certwizard-windows
            executable: certwizard.exe
          - os: ubuntu-latest
            artifact_name: certwizard-linux
            executable: certwizard
          - os: macos-latest
            artifact_name: certwizard-macos
            executable: certwizard

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ubuntu runners ship a minimal python that has no tkinter
      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow openpyxl fpdf2 pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name certwizard `
            --icon icon.ico `
            --add-data "fonts;fonts" `
            --add-data "app;app" `
            --hidden-import PIL._tkinter_finder `
            --collect-all fpdf2 `
            --collect-all openpyxl `
            main.py
        shell: pwsh

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name certwizard \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name certwizard \
            --icon icon.ico \
            --add-data "fonts:fonts" \
            --add-data "app:app" \
            --hidden-import PIL._tkinter_finder \
            --collect-all fpdf2 \
            --collect-all openpyxl \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable }}
          retention-days: 30

  release:
    name: Attach binaries to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename binaries for clarity
        run: |
          mv dist/certwizard-windows/certwizard.exe dist/certwizard-windows.exe
          mv dist/certwizard-linux/certwizard dist/certwizard-linux
          mv dist/certwizard-macos/certwizard dist/certwizard-macos

      - name: Upload binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/certwizard-windows.exe
            dist/certwizard-linux
            dist/certwizard-macos
